
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Cabrino Nsala Chats</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#0f172a;color:#fff;height:100vh;display:flex}
#auth{width:100%;display:flex;align-items:center;justify-content:center}
.card{background:#1e293b;padding:20px;border-radius:12px;min-width:280px}
input{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none}
button{padding:10px 12px;border:none;border-radius:8px;background:#22c55e;color:#fff;cursor:pointer;width:100%}
a{color:#38bdf8;cursor:pointer}
#app{display:none;width:100%;height:100%}
.sidebar{width:30%;background:#111827;padding:10px;overflow-y:auto}
.chat{width:70%;display:flex;flex-direction:column}
.user{padding:10px;border-bottom:1px solid #374151;cursor:pointer;display:flex;justify-content:space-between}
.user:hover{background:#1f2937}
.status{font-size:12px}
.status.on{color:#22c55e}
.status.off{color:#9ca3af}
.header{padding:10px;border-bottom:1px solid #374151}
#messages{flex:1;overflow-y:auto;padding:10px}
.msg{margin:6px 0}
.me{color:#22c55e}
.other{color:#fff}
.footer{display:flex;padding:10px;border-top:1px solid #374151}
.footer input{flex:1;margin-right:8px}
</style>
</head>
<body>

<div id="auth">
  <div class="card" id="loginCard">
    <h3>Connexion</h3>
    <input id="l_user" placeholder="Nom d'utilisateur">
    <input id="l_pass" type="password" placeholder="Mot de passe">
    <button onclick="login()">Se connecter</button>
    <p>Pas de compte ? <a onclick="showRegister()">Créer</a></p>
  </div>

  <div class="card" id="registerCard" style="display:none">
    <h3>Inscription</h3>
    <input id="r_user" placeholder="Nom d'utilisateur">
    <input id="r_pass" type="password" placeholder="Mot de passe">
    <button onclick="register()">Créer</button>
    <p>Déjà un compte ? <a onclick="showLogin()">Connexion</a></p>
  </div>
</div>

<div id="app">
  <div class="sidebar" id="users"></div>
  <div class="chat">
    <div class="header" id="chatWith">Choisis un contact</div>
    <div id="messages"></div>
    <div class="footer">
      <input id="msg" placeholder="Message...">
      <button onclick="send()">Envoyer</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
let socket = null;
let me = null;
let target = null;
const usersDiv = document.getElementById("users");
const messagesDiv = document.getElementById("messages");

function showRegister(){ document.getElementById("loginCard").style.display="none"; document.getElementById("registerCard").style.display="block"; }
function showLogin(){ document.getElementById("registerCard").style.display="none"; document.getElementById("loginCard").style.display="block"; }

async function register(){
  const username = document.getElementById("r_user").value;
  const password = document.getElementById("r_pass").value;
  const res = await fetch("/register",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
  const data = await res.json();
  if(data.ok){ alert("Compte créé"); showLogin(); } else { alert(data.msg||"Erreur"); }
}

async function login(){
  const username = document.getElementById("l_user").value;
  const password = document.getElementById("l_pass").value;
  const res = await fetch("/login",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
  const data = await res.json();
  if(!data.ok){ alert(data.msg||"Erreur"); return; }
  me = data.username;
  document.getElementById("auth").style.display="none";
  document.getElementById("app").style.display="flex";

  socket = io();
  socket.emit("join", me);

  socket.on("private message", (msg)=>{
    if(!target) return;
    if((msg.from===me && msg.to===target) || (msg.from===target && msg.to===me)){
      addMsg(msg);
    }
  });

  socket.on("presence", ({username, online})=>{
    const el = document.querySelector(`[data-user="${username}"] .status`);
    if(el){
      el.textContent = online ? "en ligne" : "hors ligne";
      el.className = "status " + (online ? "on":"off");
    }
  });

  loadUsers();
}

async function loadUsers(){
  const res = await fetch("/users");
  const users = await res.json();
  usersDiv.innerHTML = "";
  users.forEach(u=>{
    if(u.username===me) return;
    const div = document.createElement("div");
    div.className = "user";
    div.setAttribute("data-user", u.username);
    div.innerHTML = `<span>${u.username}</span><span class="status ${u.online?'on':'off'}">${u.online?'en ligne':'hors ligne'}</span>`;
    div.onclick = ()=> selectUser(u.username);
    usersDiv.appendChild(div);
  });
}

async function selectUser(u){
  target = u;
  document.getElementById("chatWith").textContent = "Chat avec " + u;
  messagesDiv.innerHTML = "";
  const res = await fetch(`/messages?u1=${encodeURIComponent(me)}&u2=${encodeURIComponent(u)}`);
  const msgs = await res.json();
  msgs.forEach(addMsg);
}

function addMsg(m){
  const p = document.createElement("p");
  p.className = "msg " + (m.from===me ? "me":"other");
  p.innerHTML = `<b>${m.from}:</b> ${m.text}`;
  messagesDiv.appendChild(p);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function send(){
  if(!target) return alert("Choisis un contact");
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if(!text) return;
  socket.emit("private message", { from: me, to: target, text });
  input.value = "";
}
</script>

</body>
</html>
