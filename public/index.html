<!DOCTYPE html>
<html>
<head>
  <title>Mini WhatsApp</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">
  <h2>Numéro</h2>
  <input id="number" placeholder="+243..." />
  <button onclick="login()">Entrer</button>
</div>

<div id="app">
  <div id="sidebar">
    <input id="contact" placeholder="Numéro contact">
    <button onclick="openChat()">Ouvrir</button>
  </div>

  <div id="chat">
    <div id="messages"></div>

    <input id="msg" placeholder="Message...">
    <input type="file" id="file">
    <button onclick="send()">Envoyer</button>
    <button id="record">🎤</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
